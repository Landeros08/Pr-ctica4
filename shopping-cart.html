<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carrito - Vortex</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-sm navbar-light bg-light">
      <div class="container">
        <a class="navbar-brand" href="index.html">Navbar</a>
        <button
          class="navbar-toggler d-lg-none"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#collapsibleNavId"
          aria-controls="collapsibleNavId"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="collapsibleNavId">
          <ul class="navbar-nav me-auto mt-2 mt-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Pedidos</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Categorías</a>
            </li>
          </ul>
          <form class="d-flex my-2 my-lg-0">
            <input
              class="form-control me-sm-2"
              type="text"
              placeholder="Search"
            />
            <button class="btn btn-outline-success my-2 my-sm-0" type="submit">
              Search
            </button>
          </form>

          <a
            href="shopping-cart.html"
            class="btn btn-dark position-relative ms-3"
          >
            <i class="fa-solid fa-cart-shopping"></i>
          </a>
        </div>
      </div>
    </nav>

    <div class="container mt-5 mb-5">
      <h2 class="mb-4">Resumen de compra</h2>

      <div class="row">
        <div class="col-12 col-lg-8" id="lista-carrito"></div>

        <div class="col-12 col-lg-4 mt-4 mt-lg-0">
          <div class="card shadow-sm">
            <div class="card-body">
              <h4 class="card-title mb-4">Total de compra</h4>

              <div class="d-flex justify-content-between mb-2">
                <span>Subtotal:</span>
                <strong id="subtotal-precio">$0.00 MXN</strong>
              </div>
              <div class="d-flex justify-content-between mb-3">
                <span>Envío:</span>
                <strong class="text-success">Gratis</strong>
              </div>
              <hr />
              <div class="d-flex justify-content-between mb-4">
                <span class="fs-5">Total:</span>
                <strong class="fs-5 text-primary" id="total-precio"
                  >$0.00 MXN</strong
                >
              </div>

              <div class="d-grid gap-2">
                <button class="btn btn-success btn-lg" type="button">
                  Pagar
                </button>
                <button
                  class="btn btn-outline-secondary"
                  type="button"
                  onclick="limpiarCarrito()"
                >
                  Cancelar Compra
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="carrito.js"></script>
  </body>
</html>
